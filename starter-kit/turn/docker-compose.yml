services:
  coturn:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: starter-kit-coturn
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "${TURN_PORT:-3478}:${TURN_PORT:-3478}/tcp"
      - "${TURN_PORT:-3478}:${TURN_PORT:-3478}/udp"
      - "${TURN_MIN_PORT:-48160}-${TURN_MAX_PORT:-48200}:${TURN_MIN_PORT:-48160}-${TURN_MAX_PORT:-48200}/udp"
